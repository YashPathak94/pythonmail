apiVersion: v1
kind: ServiceAccount
metadata:
  name: adot-prometheus-collector
  namespace: default   # ⚠️ must match your collector namespace

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: adot-prometheus-role
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - endpoints
      - services
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: adot-prometheus-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: adot-prometheus-role
subjects:
  - kind: ServiceAccount
    name: adot-prometheus-collector
    namespace: default

++++++++++++++++++++++++++++++++++++

apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: adot-prometheus
  namespace: default
spec:
  mode: daemonset

  config: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: 'spring-boot'
              kubernetes_sd_configs:
                - role: pod

              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true

                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__

                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  target_label: __address__
                  regex: (.+)
                  replacement: $1

    processors:
      batch:

    exporters:
      awsemf:
        namespace: "ContainerInsights/Prometheus"
        log_group_name: "/aws/containerinsights/${CLUSTER_NAME}/prometheus"
        region: ap-south-1
        dimension_rollup_option: NoDimensionRollup

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [batch]
          exporters: [awsemf]
